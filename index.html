<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friend Chat</title>
    <style>
        /* Basic styling to make it not look like 1995 */
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        #chat-box { 
            height: 300px; 
            overflow-y: scroll; 
            border: 1px solid #ccc; 
            background: white; 
            padding: 10px;
            margin-bottom: 10px;
        }
        input { padding: 8px; }
    </style>
</head>
<body>

    <h2>Private Chat</h2>
    <div id="chat-box"></div>
    
    <input type="text" id="username" placeholder="Name" style="width: 80px;">
    <input type="text" id="message" placeholder="Type a message..." style="width: 200px;">
    <button onclick="sendMessage()">Send</button>

    <!-- Your Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // PASTE YOUR CONFIG FROM FIREBASE CONSOLE HERE
        const firebaseConfig = {

        apiKey: "AIzaSyDSuU713_Pl_m8CHlGzTzPWLLSuOMjDrR0",
        
        authDomain: "the-dashboard-2532744.firebaseapp.com",
        
        projectId: "the-dashboard-2532744",
        
        storageBucket: "the-dashboard-2532744.firebasestorage.app",
        
        messagingSenderId: "170415567071",
        
        appId: "1:170415567071:web:ffb14b0a0fde4ad142f96a"
        
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "messages");

        const chatBox = document.getElementById('chat-box');

        onChildAdded(chatRef, (data) => {
            const msg = data.val();
            const msgElement = document.createElement('p');
            msgElement.innerHTML = `<b>${msg.user}:</b> ${msg.text}`;
            chatBox.appendChild(msgElement);
            chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
        });

        // Change your function definition to this:
        window.sendMessage = () => {
            const user = document.getElementById('username').value || "Anonymous";
            const text = document.getElementById('message').value;
            
            console.log("Attempting to send:", text); // Debugging line
        
            if (text.trim() !== "") {
                push(chatRef, { 
                    user: user, 
                    text: text,
                    timestamp: Date.now() 
                }).then(() => {
                    console.log("Message sent successfully!");
                }).catch((error) => {
                    console.error("Firebase Error:", error);
                });
                
                document.getElementById('message').value = '';
            }
        };
    </script>
</body>
</html>
