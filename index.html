<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <title>The Dashboard</title>
    <style>
        /* SCROLLBAR STYLING */
        #chat-box::-webkit-scrollbar { width: 8px; }
        #chat-box::-webkit-scrollbar-track { background: #1a1a1a; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #1a1a1a; 
            color: #00ff00; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            margin: 0;
            overflow-x: hidden;
        }

        /* NOTIFICATION POPUP */
        #notification-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 400px;
        }

        .toast {
            background: #ff4444;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            animation: slideDown 0.4s ease-out;
            border-left: 5px solid #fff;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* SIDE MENU */
        #side-menu {
            position: fixed;
            top: 0;
            right: -260px; 
            width: 220px;
            height: 100%;
            background: #262626;
            border-left: 2px solid #ff4444;
            padding: 20px;
            transition: 0.3s;
            z-index: 1000;
            overflow-y: auto;
        }
        #side-menu.active { right: 0; }

        /* CHAT BOX */
        #chat-box { 
            height: 400px; 
            width: 90%;
            max-width: 600px;
            overflow-y: scroll; 
            border: 2px solid #333; 
            background: #262626; 
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }

        .dm-banner {
            background: #333;
            padding: 10px;
            width: 90%;
            max-width: 600px;
            display: none; 
            justify-content: space-between;
            align-items: center;
            border-radius: 5px 5px 0 0;
            border-bottom: 1px solid #ff4444;
            margin-bottom: 5px;
            box-sizing: border-box;
        }

        p { margin: 5px 0; border-bottom: 1px solid #2a2a2a; padding-bottom: 5px; }
        b { color: #ff4444; }

        input { 
            background: #333; 
            border: 1px solid #00ff00; 
            color: #00ff00; 
            padding: 10px;
            border-radius: 3px;
            font-size: 16px;
            outline: none;
        }

        button { 
            background: #ff4444; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            cursor: pointer;
            font-weight: bold;
            border-radius: 3px;
        }

        .player-entry {
            padding: 10px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 4px;
            background: #222;
            font-size: 14px;
        }
        .player-entry:hover { background: #333; }
        
        .unread-tag {
            background: #ff4444;
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 3px;
            float: right;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            #side-menu { width: 75%; right: -80%; }
            #chat-box { width: 95%; }
        }
    </style>
</head>
<body>

    <div id="notification-container"></div>

    <h2 id="view-title">The Dashboard</h2>

    <div id="login-screen" style="text-align: center; margin-top: 50px;">
        <h3>Access Terminal</h3>
        <input type="text" id="login-user" placeholder="Username"><br><br>
        <input type="password" id="login-pass" placeholder="Password"><br><br>
        <button onclick="checkLogin()">Login</button>
        <p id="login-error" style="color: #ff4444;"></p>
    </div>

    <div id="main-chat" style="display: none; width: 100%; max-width: 600px;">
        <div id="menu-icon" onclick="toggleMenu()" style="cursor:pointer; font-size: 24px; position: fixed; top: 10px; right: 20px;">☰</div>

        <div id="side-menu">
            <div onclick="toggleMenu()" style="cursor:pointer; text-align: right; font-size: 20px; color: #ff4444;">✕</div>
            <h3>Menu</h3>
            <p style="color: #888; font-size: 12px;">Logged in: <span id="display-user" style="color:#00ff00;"></span></p>
            <hr color="#333">
            <button onclick="switchView('all')" style="width:100%; background: #444; margin-bottom: 10px;">Global Chat</button>
            
            <h4 style="margin-bottom: 5px;">Contacts:</h4>
            <div id="player-list"></div>
            
            <hr color="#333" style="margin-top: 20px;">
            <button onclick="logout()" style="width:100%;">Logout</button>
        </div>

        <div id="dm-banner" class="dm-banner">
            <span id="dm-target-name">Direct Message</span>
            <button onclick="switchView('all')" style="padding: 5px 10px; font-size: 12px; background: #555;">Back to Global</button>
        </div>

        <div id="chat-box"></div>

        <div style="display: flex; gap: 5px; width: 90%; margin: 0 auto;">
            <input type="text" id="message" style="flex-grow: 1;" onkeypress="if(event.key === 'Enter') sendMessage()" placeholder="Message Everyone">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const USERS = {
            "obsidianblocku8c (owner)": "2532744", "longsnail": "f9q11", "slyfox": "t5p65",
            "creepysnake": "g6b92", "perfecthyena": "p2x53", "busybee": "h7y14",
            "fastdolphin": "t4n68", "smartdog": "f3o94", "bigelephant": "y6h24",
            "largeporcupine": "i0g32", "humorousseal": "u6n43", "overjoyedgerbil": "l2b52",
            "wigglycat": "z9x08", "luckymink": "r8c23", "brightclam": "v3m74",
            "bison": "hehe", "mantaray": "hehe", "turtle": "hehe", "gecko": "hehe", "rhino": "hehe"
        };

        const firebaseConfig = {
            databaseURL: "https://the-dashboard-2532744-default-rtdb.firebaseio.com",
            apiKey: "AIzaSyDSuU713_Pl_m8CHlGzTzPWLLSuOMjDrR0",
            projectId: "the-dashboard-2532744",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "messages");

        let currentUser = "";
        let selectedTarget = "all"; 
        let allMessages = []; 
        let onlineUsers = {};
        let unreadFrom = new Set(); // Track users who sent unread DMs

        window.checkLogin = function() {
            const user = document.getElementById('login-user').value.toLowerCase();
            const pass = document.getElementById('login-pass').value;

            if (USERS[user] && USERS[user] === pass) {
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-chat').style.display = 'block';
                document.getElementById('display-user').innerText = user;
                initPresence(user);
            } else {
                document.getElementById('login-error').innerText = "Invalid credentials.";
            }
        };

        function initPresence(user) {
            const statusRef = ref(db, 'status/' + user);
            onValue(ref(db, '.info/connected'), (snap) => {
                if (snap.val() === true) {
                    set(statusRef, "online");
                    onDisconnect(statusRef).remove();
                }
            });
            onValue(ref(db, 'status'), (snapshot) => {
                onlineUsers = snapshot.val() || {};
                updatePlayerList();
            });
        }

        function updatePlayerList() {
            const listDiv = document.getElementById('player-list');
            listDiv.innerHTML = "";

            const interactedUsers = new Set();
            allMessages.forEach(m => {
                if (m.target !== "all") {
                    if (m.user === currentUser) interactedUsers.add(m.target);
                    if (m.target === currentUser) interactedUsers.add(m.user);
                }
            });

            Object.keys(USERS).forEach(name => {
                if (name === currentUser) return;
                const isOnline = onlineUsers[name] === "online";
                const hasHistory = interactedUsers.has(name);

                if (isOnline || hasHistory) {
                    const div = document.createElement('div');
                    div.className = "player-entry";
                    const statusColor = isOnline ? "#00ff00" : "#555";
                    const unreadLabel = unreadFrom.has(name) ? `<span class="unread-tag">NEW</span>` : "";
                    
                    div.innerHTML = `<span style="color:${statusColor}">●</span> ${name} ${unreadLabel}`;
                    div.onclick = () => { switchView(name); toggleMenu(); };
                    listDiv.appendChild(div);
                }
            });
        }

        window.switchView = function(target) {
            selectedTarget = target;
            unreadFrom.delete(target); // Clear unread status for this person
            
            const chatBox = document.getElementById('chat-box');
            const banner = document.getElementById('dm-banner');
            const title = document.getElementById('view-title');
            const input = document.getElementById('message');

            chatBox.innerHTML = ""; 

            if (target === "all") {
                banner.style.display = "none";
                title.innerText = "Global Chat";
                input.placeholder = "Message Everyone";
            } else {
                banner.style.display = "flex";
                document.getElementById('dm-target-name').innerText = `DM: ${target}`;
                title.innerText = "Direct Messages";
                input.placeholder = `Message ${target}...`;
            }

            allMessages.forEach(msg => renderMessage(msg));
            updatePlayerList();
        };

        function renderMessage(msg) {
            const chatBox = document.getElementById('chat-box');
            let shouldShow = false;

            if (selectedTarget === "all") {
                if (msg.target === "all") shouldShow = true;
            } else {
                const isConversation = (msg.user === selectedTarget && msg.target === currentUser) || 
                                      (msg.user === currentUser && msg.target === selectedTarget);
                if (isConversation) shouldShow = true;
            }

            if (shouldShow) {
                const p = document.createElement('p');
                const isPrivate = msg.target !== "all";
                const label = isPrivate ? `<span style="color:#ff4444; font-size:10px;">[DM]</span> ` : "";
                p.innerHTML = `${label}<b>${msg.user}:</b> ${msg.text}`;
                if (isPrivate) p.style.fontStyle = "italic";
                chatBox.appendChild(p);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function showNotification(from, text) {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<strong>New DM from ${from}</strong><br>${text.substring(0, 40)}${text.length > 40 ? '...' : ''}`;
            
            toast.onclick = () => {
                switchView(from);
                toast.remove();
            };

            container.appendChild(toast);
            setTimeout(() => { if(toast) toast.remove(); }, 5000); // Auto hide after 5s
        }

        window.sendMessage = () => {
            const input = document.getElementById('message');
            if (input.value.trim() && currentUser) {
                push(chatRef, {
                    user: currentUser,
                    text: input.value,
                    target: selectedTarget,
                    timestamp: Date.now()
                });
                input.value = "";
            }
        };

        onChildAdded(chatRef, (data) => {
            const msg = data.val();
            const isFirstLoad = allMessages.length < 5; // Simple check to avoid spamming old notifications on login
            
            allMessages.push(msg);

            // NOTIFICATION LOGIC
            if (msg.target === currentUser && msg.user !== currentUser) {
                if (selectedTarget !== msg.user) {
                    unreadFrom.add(msg.user);
                    if (!isFirstLoad) showNotification(msg.user, msg.text);
                }
            }

            renderMessage(msg);
            updatePlayerList();
        });

        window.toggleMenu = () => document.getElementById('side-menu').classList.toggle('active');
        window.logout = () => location.reload();
    </script>
</body>
</html>
