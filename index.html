<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dashboard</title>
    <style>
        #side-menu {
            position: fixed;
            top: 0;
            right: -250px; /* Hidden off-screen by default */
            width: 200px;
            height: 100%;
            background: #262626;
            border-left: 2px solid #ff4444; /* Red accent line */
            padding: 20px;
            transition: 0.3s; /* Smooth sliding effect */
            z-index: 1000;
        }
        
        #side-menu.active {
            right: 0; /* Slide in */
        }
        
        #menu-icon:hover {
            color: #ff4444;
        }
        #chat-box::-webkit-scrollbar {
            width: 8px;
        }
        #chat-box::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        #chat-box::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #1a1a1a; /* Dark Gray */
            color: #00ff00; /* Classic Green */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }
    
        #chat-box { 
            height: 400px; 
            width: 90%;
            max-width: 600px;
            overflow-y: scroll; 
            border: 2px solid #333; 
            background: #262626; /* Slightly lighter gray for the box */
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.1);
        }
    
        /* Message styling */
        p { margin: 5px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        b { color: #ff4444; } /* Red for Usernames */
    
        input { 
            background: #333; 
            border: 1px solid #00ff00; 
            color: #00ff00; 
            padding: 10px;
            margin: 5px;
            border-radius: 3px;
        }
    
        button { 
            background: #ff4444; /* Red Button */
            color: white; 
            border: none; 
            padding: 10px 20px; 
            cursor: pointer;
            font-weight: bold;
            border-radius: 3px;
        }
    
        button:hover {
            background: #cc0000;
        }
    
        #login-error { color: #ff4444; font-weight: bold; }
    </style>
</head>
<body>

    <h2>The Dashboard Chat</h2>
    <div id="ai-note" class="bottom-right-text">
        Note this page is partially the output of AI
    </div>
    <!-- Login UI -->
    <div id="login-screen" style="text-align: center; margin-top: 50px;">
        <h3>Enter Credentials</h3>
        <input type="text" id="login-user" placeholder="Username"><br><br>
        <input type="password" id="login-pass" placeholder="Password"><br><br>
        <button onclick="checkLogin()">Login</button>
        <p id="login-error" style="color: red;"></p>
    </div>
    
    <!-- Chat UI (Hidden by default) -->
    <div id="main-chat" style="display: none;">
        <div id="menu-icon" onclick="toggleMenu()" style="cursor:pointer; font-size: 24px; position: fixed; top: 10px; right: 20px;">☰</div>
    
        <div id="side-menu" class="menu-hidden">
            <h3>Dashboard</h3>
            <p>User: <span id="display-user" style="color:#00ff00;"></span></p>
            
            <hr border="1" color="#333">
            
            <h4>Active Nodes:</h4>
            <div id="presence-list" style="font-size: 14px; color: #00ff00;">
                </div>
        
            <hr border="1" color="#333">
            <button onclick="clearChat()">Wipe History</button>
            <button onclick="logout()">Logout</button>
        </div>

        <h2 id="welcome-msg"></h2>
        <div id="chat-box"></div>
        </div>
            <input type="text" id="message" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>

    <!-- Your Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const USERS = {
            "obsidianblocku8c (owner)": "2532744",
            "longsnail": "f9q11",
            "slyfox": "t5p65",
            "creepysnake": "g6b92",
            "perfecthyena": "p2x53",
            "busybee": "h7y14",
            "fastdolphin": "t4n68",
            "smartdog": "f3o94",
            "bigelephant": "y6h24"
        };
        
        // PASTE YOUR CONFIG FROM FIREBASE CONSOLE HERE
        const firebaseConfig = {
            databaseURL: "https://the-dashboard-2532744-default-rtdb.firebaseio.com",

            apiKey: "AIzaSyDSuU713_Pl_m8CHlGzTzPWLLSuOMjDrR0",
        
            authDomain: "the-dashboard-2532744.firebaseapp.com",
        
            projectId: "the-dashboard-2532744",
        
            storageBucket: "the-dashboard-2532744.firebasestorage.app",
        
            messagingSenderId: "170415567071",
        
            appId: "1:170415567071:web:ffb14b0a0fde4ad142f96a"
        
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "messages");

        const chatBox = document.getElementById('chat-box');

        let currentUser = "";
        let selectedTarget = "all";

        window.setupPresence = (username) => {
            // 1. Define the "addresses" (REFS) first
            const userStatusRef = ref(db, 'status/' + username);
            const connectedRef = ref(db, '.info/connected');
            const allStatusesRef = ref(db, 'status'); // <--- DEFINED FIRST
        
            // 2. Handle your own connection status
            onValue(connectedRef, (snap) => {
                if (snap.val() === true) {
                    set(userStatusRef, "online");
                    onDisconnect(userStatusRef).remove();
                }
            });
        
            // 3. NOW listen for everyone else
            onValue(allStatusesRef, (snapshot) => {
                const statuses = snapshot.val() || {};
                const presenceList = document.getElementById('presence-list');
                if (!presenceList) return; // Safety check
        
                presenceList.innerHTML = `<div onclick="setTarget('all')" style="cursor:pointer; color: #fff;">[ Broadcast ]</div>`; 
                
                Object.keys(statuses).forEach(user => {
                    const isMe = user === window.currentUser;
                    const color = isMe ? "#555" : "#00ff00"; 
                    const entry = document.createElement('div');
                    entry.style.cursor = "pointer";
                    entry.innerHTML = `<span style="color: ${color};">●</span> ${user}`;
                    
                    entry.onclick = () => { if(!isMe) setTarget(user); };
                    presenceList.appendChild(entry);
                });
            });
        };

        window.setTarget = (user) => {
            selectedTarget = user;
            const msgInput = document.getElementById('message');
            msgInput.placeholder = (user === "all") ? "Message everyone..." : `Whisper to ${user}...`;
            // Visual feedback
            msgInput.style.borderColor = (user === "all") ? "#00ff00" : "#ff4444"; 
        };
        
        // Toggle the menu visibility
        window.toggleMenu = () => {
            const menu = document.getElementById('side-menu');
            menu.classList.toggle('active');
        };
        
        // Log out and clear session
        window.logout = () => {
            localStorage.removeItem("chat_user");
            location.reload(); // Refresh the page to show login screen
        };
        
        // OPTIONAL: Clear the Firebase chat data
        // WARNING: This deletes everyone's messages!
        
        window.clearChat = () => {
            if (confirm("Are you sure you want to delete all messages?")) {
                set(chatRef, null).then(() => {
                    document.getElementById('chat-box').innerHTML = "";
                    alert("Chat cleared.");
                });
            }
        };
        
        window.checkLogin = function() {
            const userField = document.getElementById('login-user');
            const passField = document.getElementById('login-pass');
            
            const user = userField.value.toLowerCase();
            const pass = passField.value;
        
            if (USERS[user] && USERS[user] === pass) {
                // Success logic
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('ai-note').style.display = 'none';
                document.getElementById('main-chat').style.display = 'block';

                window.setupPresence(user);
                // Set the global currentUser variable we'll use for sending
                window.currentUser = user; 
                document.getElementById('welcome-msg').innerText = `Logged in as: ${user}`;
                // Inside your checkLogin success block:
                document.getElementById('display-user').innerText = user;
            } else {
                document.getElementById('login-error').innerText = "Invalid username or password.";
            }
        };
        
        // Update your sendMessage function to use the logged-in user
        window.sendMessage = () => {
            const messageInput = document.getElementById('message');
            const text = messageInput.value;
        
            if (text.trim() !== "" && window.currentUser) {
                push(chatRef, { 
                    user: window.currentUser, 
                    text: text,
                    target: selectedTarget, // Add this!
                    timestamp: Date.now()
                });
                messageInput.value = '';
                setTarget('all'); // Reset to public after sending (optional)
            }
        };
        
        onChildAdded(chatRef, (data) => {
            const msg = data.val();
            
            // THE FILTER LOGIC
            const isForMe = msg.target === window.currentUser;
            const isFromMe = msg.user === window.currentUser;
            const isPublic = msg.target === "all";
        
            if (isPublic || isForMe || isFromMe) {
                const msgElement = document.createElement('p');
                
                // Add a "WHISPER" label if it's private
                const prefix = isPublic ? "" : `<span style="color:#ff4444; font-size:10px;">[WHISPER]</span> `;
                
                msgElement.innerHTML = `${prefix}<b>${msg.user}:</b> ${msg.text}`;
                
                // Style whispers differently
                if (!isPublic) msgElement.style.fontStyle = "italic";
                
                chatBox.appendChild(msgElement);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });
    </script>
</body>
</html>
