<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dashboard</title>
    <style>
        /* SCROLLBAR STYLING */
        #chat-box::-webkit-scrollbar { width: 8px; }
        #chat-box::-webkit-scrollbar-track { background: #1a1a1a; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #1a1a1a; 
            color: #00ff00; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            margin: 0;
        }

        /* SIDE MENU */
        #side-menu {
            position: fixed;
            top: 0;
            right: -260px; 
            width: 220px;
            height: 100%;
            background: #262626;
            border-left: 2px solid #ff4444;
            padding: 20px;
            transition: 0.3s;
            z-index: 1000;
            overflow-y: auto;
        }
        #side-menu.active { right: 0; }

        /* CHAT BOX */
        #chat-box { 
            height: 400px; 
            width: 90%;
            max-width: 600px;
            overflow-y: scroll; 
            border: 2px solid #333; 
            background: #262626; 
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.1);
        }

        .dm-banner {
            background: #333;
            padding: 10px;
            width: 90%;
            max-width: 600px;
            display: none; /* Hidden until in DM mode */
            justify-content: space-between;
            align-items: center;
            border-radius: 5px 5px 0 0;
            border-bottom: 1px solid #ff4444;
            margin-bottom: 5px;
            box-sizing: border-box;
        }

        p { margin: 5px 0; border-bottom: 1px solid #2a2a2a; padding-bottom: 5px; line-height: 1.4; }
        b { color: #ff4444; } /* Usernames */

        input { 
            background: #333; 
            border: 1px solid #00ff00; 
            color: #00ff00; 
            padding: 10px;
            border-radius: 3px;
            font-size: 16px;
            outline: none;
        }

        button { 
            background: #ff4444; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            cursor: pointer;
            font-weight: bold;
            border-radius: 3px;
        }

        button:hover { background: #cc0000; }

        .player-entry {
            padding: 8px;
            margin: 4px 0;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
            font-size: 14px;
        }
        .player-entry:hover { background: #333; }

        @media (max-width: 600px) {
            #side-menu { width: 70%; right: -75%; }
            #chat-box { width: 95%; }
        }
    </style>
</head>
<body>

    <h2 id="view-title">The Dashboard</h2>

    <div id="login-screen" style="text-align: center; margin-top: 50px;">
        <h3>Enter Credentials</h3>
        <input type="text" id="login-user" placeholder="Username"><br><br>
        <input type="password" id="login-pass" placeholder="Password"><br><br>
        <button onclick="checkLogin()">Login</button>
        <p id="login-error" style="color: #ff4444;"></p>
    </div>

    <div id="main-chat" style="display: none; width: 100%; max-width: 600px;">
        <div id="menu-icon" onclick="toggleMenu()" style="cursor:pointer; font-size: 24px; position: fixed; top: 10px; right: 20px;">☰</div>

        <div id="side-menu">
            <div onclick="toggleMenu()" style="cursor:pointer; text-align: right; font-size: 20px; color: #ff4444;">✕</div>
            <h3>System Menu</h3>
            <p style="color: #888;">Logged in: <span id="display-user" style="color:#00ff00;"></span></p>
            <hr color="#333">
            <button onclick="switchView('all')" style="width:100%; background: #444; margin-bottom: 10px;">Global Chat</button>
            
            <h4 style="margin-bottom: 5px;">Contacts:</h4>
            <div id="player-list"></div>
            
            <hr color="#333" style="margin-top: 20px;">
            <button onclick="logout()" style="width:100%;">Logout</button>
        </div>

        <div id="dm-banner" class="dm-banner">
            <span id="dm-target-name">Direct Message</span>
            <button onclick="switchView('all')" style="padding: 5px 10px; font-size: 12px; background: #555;">Back to Global</button>
        </div>

        <div id="chat-box"></div>

        <div style="display: flex; gap: 5px;">
            <input type="text" id="message" style="flex-grow: 1;" onkeypress="if(event.key === 'Enter') sendMessage()" placeholder="Message Everyone">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURATION
        const USERS = {
            "obsidianblocku8c (owner)": "2532744", "longsnail": "f9q11", "slyfox": "t5p65",
            "creepysnake": "g6b92", "perfecthyena": "p2x53", "busybee": "h7y14",
            "fastdolphin": "t4n68", "smartdog": "f3o94", "bigelephant": "y6h24",
            "largeporcupine": "i0g32", "humorousseal": "u6n43", "overjoyedgerbil": "l2b52",
            "wigglycat": "z9x08", "luckymink": "r8c23", "brightclam": "v3m74",
            "bison": "hehe", "mantaray": "hehe", "turtle": "hehe", "gecko": "hehe", "rhino": "hehe"
        };

        const firebaseConfig = {
            databaseURL: "https://the-dashboard-2532744-default-rtdb.firebaseio.com",
            apiKey: "AIzaSyDSuU713_Pl_m8CHlGzTzPWLLSuOMjDrR0",
            authDomain: "the-dashboard-2532744.firebaseapp.com",
            projectId: "the-dashboard-2532744",
            storageBucket: "the-dashboard-2532744.firebasestorage.app",
            messagingSenderId: "170415567071",
            appId: "1:170415567071:web:ffb14b0a0fde4ad142f96a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "messages");

        // STATE
        let currentUser = "";
        let selectedTarget = "all"; 
        let allMessages = []; 
        let onlineUsers = {};

        // LOGIN LOGIC
        window.checkLogin = function() {
            const user = document.getElementById('login-user').value.toLowerCase();
            const pass = document.getElementById('login-pass').value;

            if (USERS[user] && USERS[user] === pass) {
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-chat').style.display = 'block';
                document.getElementById('display-user').innerText = user;
                
                initPresence(user);
            } else {
                document.getElementById('login-error').innerText = "Invalid credentials.";
            }
        };

        // PRESENCE & LIST FILTERING
        function initPresence(user) {
            const statusRef = ref(db, 'status/' + user);
            const connectedRef = ref(db, '.info/connected');
            const allStatusesRef = ref(db, 'status');

            onValue(connectedRef, (snap) => {
                if (snap.val() === true) {
                    set(statusRef, "online");
                    onDisconnect(statusRef).remove();
                }
            });

            onValue(allStatusesRef, (snapshot) => {
                onlineUsers = snapshot.val() || {};
                updatePlayerList();
            });
        }

        function updatePlayerList() {
            const listDiv = document.getElementById('player-list');
            listDiv.innerHTML = "";

            // Find history from the persistent message cache
            const interactedUsers = new Set();
            allMessages.forEach(m => {
                if (m.target !== "all") {
                    if (m.user === currentUser) interactedUsers.add(m.target);
                    if (m.target === currentUser) interactedUsers.add(m.user);
                }
            });

            Object.keys(USERS).forEach(name => {
                if (name === currentUser) return;

                const isOnline = onlineUsers[name] === "online";
                const hasHistory = interactedUsers.has(name);

                if (isOnline || hasHistory) {
                    const div = document.createElement('div');
                    div.className = "player-entry";
                    const color = isOnline ? "#00ff00" : "#555";
                    const statusIcon = isOnline ? "●" : "○";
                    
                    div.innerHTML = `<span style="color:${color}">${statusIcon}</span> ${name}`;
                    div.onclick = () => { switchView(name); toggleMenu(); };
                    listDiv.appendChild(div);
                }
            });
        }

        // VIEW SWAPPING (DM vs GLOBAL)
        window.switchView = function(target) {
            selectedTarget = target;
            const chatBox = document.getElementById('chat-box');
            const banner = document.getElementById('dm-banner');
            const title = document.getElementById('view-title');
            const input = document.getElementById('message');

            chatBox.innerHTML = ""; // Clear current view

            if (target === "all") {
                banner.style.display = "none";
                title.innerText = "Global Chat";
                input.placeholder = "Message Everyone";
            } else {
                banner.style.display = "flex";
                document.getElementById('dm-target-name').innerText = `DM: ${target}`;
                title.innerText = "Direct Messages";
                input.placeholder = `Message ${target}...`;
            }

            // Re-render only relevant messages from cache
            allMessages.forEach(msg => renderMessage(msg));
        };

        function renderMessage(msg) {
            const chatBox = document.getElementById('chat-box');
            let shouldShow = false;

            if (selectedTarget === "all") {
                if (msg.target === "all") shouldShow = true;
            } else {
                // Logic: Message is between Current User and the selected DM partner
                const isFromPartner = (msg.user === selectedTarget && msg.target === currentUser);
                const isToPartner = (msg.user === currentUser && msg.target === selectedTarget);
                if (isFromPartner || isToPartner) shouldShow = true;
            }

            if (shouldShow) {
                const p = document.createElement('p');
                const isPrivate = msg.target !== "all";
                const label = isPrivate ? `<span style="color:#ff4444; font-size:10px;">[DM]</span> ` : "";
                
                p.innerHTML = `${label}<b>${msg.user}:</b> ${msg.text}`;
                if (isPrivate) p.style.fontStyle = "italic";
                
                chatBox.appendChild(p);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // SEND LOGIC
        window.sendMessage = () => {
            const input = document.getElementById('message');
            const text = input.value.trim();
            if (text && currentUser) {
                push(chatRef, {
                    user: currentUser,
                    text: text,
                    target: selectedTarget,
                    timestamp: Date.now()
                });
                input.value = "";
            }
        };

        // GLOBAL MESSAGE LISTENER
        onChildAdded(chatRef, (data) => {
            const msg = data.val();
            allMessages.push(msg); // Add to persistent session cache
            renderMessage(msg);    // Attempt to display
            updatePlayerList();    // Refresh sidebar in case history was just created
        });

        window.toggleMenu = () => {
            document.getElementById('side-menu').classList.toggle('active');
        };

        window.logout = () => location.reload();
    </script>
</body>
</html>
