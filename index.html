<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friend Chat</title>
    <style>
        /* Basic styling to make it not look like 1995 */
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        #chat-box { 
            height: 300px; 
            overflow-y: scroll; 
            border: 1px solid #ccc; 
            background: white; 
            padding: 10px;
            margin-bottom: 10px;
        }
        input { padding: 8px; }
    </style>
</head>
<body>

    <h2>Private Chat</h2>
    <div id="chat-box"></div>
    
    <input type="text" id="username" placeholder="Name" style="width: 80px;">
    <input type="text" id="message" placeholder="Type a message..." style="width: 200px;">
    <button onclick="sendMessage()">Send</button>

    <!-- Your Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // PASTE YOUR CONFIG FROM FIREBASE CONSOLE HERE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "messages");

        const chatBox = document.getElementById('chat-box');

        onChildAdded(chatRef, (data) => {
            const msg = data.val();
            const msgElement = document.createElement('p');
            msgElement.innerHTML = `<b>${msg.user}:</b> ${msg.text}`;
            chatBox.appendChild(msgElement);
            chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
        });

        window.sendMessage = () => {
            const user = document.getElementById('username').value || "Anonymous";
            const text = document.getElementById('message').value;
            if (text.trim() !== "") {
                push(chatRef, { user, text });
                document.getElementById('message').value = '';
            }
        };
    </script>
</body>
</html>
