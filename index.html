<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dashboard</title>
    <style>
        /* Basic styling to make it not look like 1995 */
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        #chat-box { 
            height: 300px; 
            overflow-y: scroll; 
            border: 1px solid #ccc; 
            background: white; 
            padding: 10px;
            margin-bottom: 10px;
        }
        input { padding: 8px; }
    </style>
</head>
<body>

    <h2>The Dashboard Chat</h2>
    <!-- Login UI -->
    <div id="login-screen" style="text-align: center; margin-top: 50px;">
        <h3>Enter Credentials</h3>
        <input type="text" id="login-user" placeholder="Username"><br><br>
        <input type="password" id="login-pass" placeholder="Password"><br><br>
        <button onclick="checkLogin()">Login</button>
        <p id="login-error" style="color: red;"></p>
    </div>
    
    <!-- Chat UI (Hidden by default) -->
    <div id="main-chat" style="display: none;">
        <h2 id="welcome-msg"></h2>
        <div id="chat-box"></div>
        <input type="text" id="message" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <!-- Your Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const USERS = {
            “LongSnail”: “f9q11”,
            “SlyFox”: “t5p65”,
            “CreepySnake”: “g6b92”,
            “PerfectHyena”: “p2x53”,
            “BusyBee”: “h7y14”,
            “FastDolphin”: “t4n68”,
            “SmartDog”: “f3o94”,
            “BigElephant”: “y6h24”
        };
        
        // PASTE YOUR CONFIG FROM FIREBASE CONSOLE HERE
        const firebaseConfig = {
            databaseURL: "https://the-dashboard-2532744-default-rtdb.firebaseio.com",

            apiKey: "AIzaSyDSuU713_Pl_m8CHlGzTzPWLLSuOMjDrR0",
        
            authDomain: "the-dashboard-2532744.firebaseapp.com",
        
            projectId: "the-dashboard-2532744",
        
            storageBucket: "the-dashboard-2532744.firebasestorage.app",
        
            messagingSenderId: "170415567071",
        
            appId: "1:170415567071:web:ffb14b0a0fde4ad142f96a"
        
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "messages");

        const chatBox = document.getElementById('chat-box');

        let currentUser = "";

        window.checkLogin = () => {
            const user = document.getElementById('login-user').value.toLowerCase();
            const pass = document.getElementById('login-pass').value;
        
            if (USERS[user] && USERS[user] === pass) {
                // Success!
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-chat').style.display = 'block';
                document.getElementById('welcome-msg').innerText = `Logged in as: ${user}`;
            } else {
                document.getElementById('login-error').innerText = "Invalid username or password.";
            }
        };
        
        // Update your sendMessage function to use the logged-in user
        window.sendMessage = () => {
            const text = document.getElementById('message').value;
            if (text.trim() !== "" && currentUser !== "") {
                push(chatRef, { 
                    user: currentUser, // Uses the account name
                    text: text,
                    timestamp: Date.now()
                });
                document.getElementById('message').value = '';
            }
        };
        
        onChildAdded(chatRef, (data) => {
            const msg = data.val();
            const msgElement = document.createElement('p');
            msgElement.innerHTML = `<b>${msg.user}:</b> ${msg.text}`;
            chatBox.appendChild(msgElement);
            chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
        });

        // Change your function definition to this:
        window.sendMessage = () => {
            const user = document.getElementById('username').value || "Anonymous";
            const text = document.getElementById('message').value;
            
            console.log("Attempting to send:", text); // Debugging line
        
            if (text.trim() !== "") {
                push(chatRef, { 
                    user: user, 
                    text: text,
                    timestamp: Date.now() 
                }).then(() => {
                    console.log("Message sent successfully!");
                }).catch((error) => {
                    console.error("Firebase Error:", error);
                });
                
                document.getElementById('message').value = '';
            }
        };
    </script>
</body>
</html>
